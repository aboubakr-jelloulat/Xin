services:
  catalogdb:
    container_name: catalog_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=CatalogDb
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - postgres_catalog:/var/lib/postgresql/data
    networks:
      - Xin-network

  adminer:
      image: adminer:latest
      container_name: adminer
      restart: unless-stopped
      ports:
        - "8888:8080"
      networks:
        - Xin-network
      depends_on:
        - catalogdb


networks:
  Xin-network:
    driver: bridge

volumes:
  postgres_catalog:




