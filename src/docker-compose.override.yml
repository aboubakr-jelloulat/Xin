services:
  catalogdb:
    container_name: catalog_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=CatalogDb
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - postgres_catalog:/var/lib/postgresql/data
    networks:
      - Xin-network

  basketdb:
    container_name: basket_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=BasketDb
    restart: always
    ports:
      - "5433:5432"
    volumes:
      - postgres_basketdb:/var/lib/postgresql/data
    networks:
      - Xin-network

  distributedcache:
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data 
    networks:
      - Xin-network

  adminer:
    image: adminer:latest
    container_name: adminer
    restart: unless-stopped
    ports:
      - "8888:8080"
    networks:
      - Xin-network
    depends_on:
      - catalogdb

  catalog.api:
    container_name: catalog.api
    build:
      context: .
      dockerfile: Services/Catalog/Catalog.API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DefaultConnection=Host=catalogdb;Port=5432;Database=CatalogDb;User Id=postgres;Password=postgres
    ports:
      - "8080:8080"
    networks:
      - Xin-network
    depends_on:
      - catalogdb

networks:
  Xin-network:
    driver: bridge

volumes:
  postgres_catalog:
  postgres_basketdb:
  redis_data: 
    